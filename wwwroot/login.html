<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">Корочки.есть</a>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="card shadow-sm p-4" style="max-width: 450px; width: 100%;">
            <h2 class="text-center mb-4 fw-bold">Вход в систему</h2>

            <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                Неверный логин или пароль. Пожалуйста, проверьте данные.
            </div>

            <form id="loginForm" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="username" class="form-label">Логин</label>
                    <input type="text" class="form-control" id="username" required placeholder="Введите логин">
                    <div class="invalid-feedback">Пожалуйста, введите логин.</div>
                </div>

                <div class="mb-3">
                    <label for="userPassword" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="userPassword" required placeholder="••••••••">
                    <div class="invalid-feedback">Пожалуйста, введите пароль.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Войти</button>
            </form>

            <hr>

            <div class="text-center small">
                <span>Еще не зарегистрированы? </span>
                <a href="registration.html" class="text-decoration-none">Регистрация</a>
            </div>
        </div>
    </main>

    <footer class="py-3 mt-auto">
        <div class="container text-center"><small>&copy; 2026 Портал «Корочки.есть» Исхакова Д.Р.</small></div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            event.stopPropagation();

            const form = event.target;
            const errorBlock = document.getElementById('errorMessage');

            // Скрываем ошибку перед новой проверкой
            errorBlock.classList.add('d-none');

            if (!form.checkValidity()) {
                // Если поля вообще не заполнены, включаем стандартные стили ошибок Bootstrap
                form.classList.add('was-validated');
            } else {
                const usernameInput = document.getElementById('username').value;
                const passwordInput = document.getElementById('userPassword').value;

                // Демонстрационная проверка (тестовый юзер или админ)
                if ((usernameInput === 'user123' && passwordInput === '123456') ||
                    (usernameInput === 'Admin' && passwordInput === 'KorokNET')) {

                    // Если зашел админ — кидаем в админку, если юзер — на просмотр заявок
                    if (usernameInput === 'Admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'orders-view.html';
                    }
                } else {
                    // Если данные не совпали — показываем кастомное сообщение об ошибке
                    errorBlock.classList.remove('d-none');
                    form.classList.remove('was-validated');
                }
            }
        });
    </script>
</body>
</html>
